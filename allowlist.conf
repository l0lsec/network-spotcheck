MSTeams         | *.office365.com
MSTeams         | *.microsoftonline.com
Microsoft       | *.microsoft.com
Microsoft       | *.office.com
Microsoft       | *.office365.com
Microsoft       | *.microsoftonline.com
Microsoft       | *.akamaitechnologies.com
OneDrive        | *.microsoft.com
OneDrive        | *.office.com
OneDrive        | *.office365.com
OneDrive        | *.microsoftonline.com
com.apple       | *.microsoft.com

