# =============================================================================
# Network Spotcheck - Process Allowlist
# =============================================================================
#
# Rules that let the scanner skip API lookups for expected traffic.
# This saves VT/AbuseIPDB quota for IPs that actually need investigation.
#
# FORMAT:
#   process_pattern | rdns_pattern
#
# - process_pattern: glob matched against the process name (case-insensitive)
# - rdns_pattern:    glob matched against the reverse DNS of the remote IP
#
# SAFETY RULES (enforced by the scanner, not configurable):
#   1. IPs with NO reverse DNS (no PTR record) are NEVER skipped.
#   2. Connections on non-standard ports are NEVER skipped.
#   3. Both the process AND the rdns must match -- one alone is not enough.
#
# Lines starting with # are comments. Blank lines are ignored.
# =============================================================================

# --- Google Chrome / Chromium ---
Google          | *.1e100.net
Google          | *.google.com
Google          | *.googleusercontent.com
Google          | *.googleapis.com
Google          | *.googlevideo.com
Google          | *.gstatic.com
Google          | *.youtube.com

